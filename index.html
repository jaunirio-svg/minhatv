<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLACK GOLD TV | CONSOLE</title>
    <style>
        body { background: #000; color: #D4AF37; font-family: 'Arial', sans-serif; margin: 0; padding: 0; overflow: hidden; }
        
        /* Moldura da TV */
        .tv-container { 
            display: flex; height: 100vh; width: 100vw; 
        }

        /* Área do Vídeo */
        .video-display { 
            flex: 1; background: #050505; border: 4px solid #1a1a1a; position: relative;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Painel de Canais Lateral (Não precisa navegar, só clicar) */
        .sidebar { 
            width: 300px; background: #0a0a0a; border-left: 2px solid #D4AF37;
            overflow-y: auto; display: flex; flex-direction: column;
        }

        .channel-btn { 
            padding: 20px; border-bottom: 1px solid #1a1a1a; cursor: pointer;
            text-decoration: none; color: #fff; font-weight: bold; font-size: 16px;
            transition: 0.3s; display: flex; align-items: center;
        }
        .channel-btn:hover { background: #D4AF37; color: #000; }
        .channel-btn span { font-size: 10px; color: #D4AF37; margin-right: 10px; border: 1px solid #D4AF37; padding: 2px 5px; }
        .channel-btn:hover span { color: #000; border-color: #000; }

        .cat-title { background: #1a1a1a; color: #D4AF37; padding: 10px; font-size: 12px; text-transform: uppercase; letter-spacing: 2px; }

        /* Esconder barra de rolagem */
        .sidebar::-webkit-scrollbar { width: 5px; }
        .sidebar::-webkit-scrollbar-thumb { background: #D4AF37; }
    </style>
</head>
<body>

    <div class="tv-container">
        <div class="video-display">
            <iframe id="tv-player" src="https://www.youtube.com/embed/live_stream?channel=UC776E0S_VjA2-Y6f-fO4H0g&autoplay=1" allowfullscreen></iframe>
        </div>

        <div class="sidebar">
            <div style="padding: 20px; text-align: center; border-bottom: 2px solid #D4AF37;">
                <h2 style="margin: 0; font-size: 18px; letter-spacing: 3px;">BLACK GOLD</h2>
            </div>

            <div class="cat-title">📍 Rio de Janeiro</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UC776E0S_VjA2-Y6f-fO4H0g')"><span>LIVE</span> TV BRASIL RJ</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UCF0UunLidid09V7N_G9n-ow')"><span>LIVE</span> RECORD NEWS</div>
            
            <div class="cat-title">🎬 Filmes & Cinema</div>
            <div class="channel-btn" onclick="changeChannel('https://pluto.tv/pt/live-tv/pluto-tv-cine-sucessos-br')"><span>FILMES</span> PLUTO CINE</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UC6XQx1tVz5E5qT8X0U5x8kA')"><span>FILMES</span> NETMOVIES</div>
            
            <div class="cat-title">⛪ Fé Católica</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UC5m0h6uF6C_lE7W3K8pWq9g')"><span>FÉ</span> CANÇÃO NOVA</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UC_7v-SOn1lF2ySg1J6kXm_w')"><span>FÉ</span> TV APARECIDA</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UC8xY7P-vS8S4-W20lW2pWaw')"><span>FÉ</span> REDE VIDA</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/embed/live_stream?channel=UCFv9Z0N8_w8Pz8V3f-v6z6Q')"><span>FÉ</span> PAI ETERNO</div>
            <div class="channel-btn" onclick="changeChannel('https://www.youtube.com/@tvevangelizaroficial/live')"><span>FÉ</span> EVANGELIZAR</div>
        </div>
    </div>

    <script>
        function changeChannel(url) {
            document.getElementById('tv-player').src = url + "?autoplay=1";
        }
    </script>

</body>
</html>
